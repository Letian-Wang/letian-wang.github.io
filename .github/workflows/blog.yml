name: Build Blog

on:
  push:
    branches: [main]
    paths:
      - 'content/blog/**'
      - 'scripts/build-blog.mjs'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run blog build script
        run: node scripts/build-blog.mjs

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog content/blog/manifest.json rss.xml sitemap.xml
          git diff --cached --quiet || git commit -m "Auto-build blog pages, manifest, RSS, and sitemap"
          git push
